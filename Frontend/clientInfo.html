<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>App Registration</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Segoe UI", sans-serif;
            }

            body {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #667eea, #764ba2);
            }

            .container {
                backdrop-filter: blur(15px);
                background: rgba(255, 255, 255, 0.1);
                padding: 40px;
                border-radius: 20px;
                width: 350px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                color: #fff;
            }

            .container h2 {
                text-align: center;
                margin-bottom: 25px;
                letter-spacing: 1px;
            }

            .input-group {
                margin-bottom: 20px;
                position: relative;
            }

            .input-group input {
                width: 100%;
                padding: 12px 10px;
                border: none;
                border-radius: 10px;
                outline: none;
                background: rgba(255, 255, 255, 0.2);
                color: #fff;
                font-size: 14px;
            }

            .input-group label {
                position: absolute;
                top: 50%;
                left: 12px;
                transform: translateY(-50%);
                color: #ddd;
                font-size: 13px;
                pointer-events: none;
                transition: 0.3s ease;
            }

            .input-group input:focus + label,
            .input-group input:valid + label {
                top: -8px;
                left: 10px;
                font-size: 11px;
                color: #fff;
                background: rgba(0, 0, 0, 0.3);
                padding: 2px 6px;
                border-radius: 6px;
            }

            .btn {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 10px;
                background: #ffffff;
                color: #764ba2;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            .btn:hover {
                background: #f1f1f1;
                transform: translateY(-2px);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Register App</h2>
            <form id="appForm">
                <div class="input-group">
                    <input class="appName" type="text" required />
                    <label>Application Name</label>
                </div>

                <div class="input-group">
                    <input class="appUrl" type="url" required />
                    <label>Application URL</label>
                </div>

                <div class="input-group">
                    <input class="redirectUrl" type="url" required />
                    <label>Redirect URL</label>
                </div>

                <button class="btn">Submit</button>
            </form>
        </div>

        <script>
            document.querySelector("#appForm").addEventListener("submit", async function (e) {
                e.preventDefault();
                let appName = document.querySelector(".appName").value;
                let appUrl = document.querySelector(".appUrl").value;
                let redirectUrl = document.querySelector(".redirectUrl").value;

                if (!appName.trim() || !appUrl.trim() || !redirectUrl.trim()) {
                    alert("fill all details");
                    return;
                }

                const response = await fetch("http://localhost:8080/addClient", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        appName: appName,
                        appUrl: appUrl,
                        redirectUrl: redirectUrl,
                    }),
                });

                let data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    alert(data.message || "Something went wrong. Please try again.");
                    return;
                } else {
                    alert("app registered");
                }
            });
        </script>
    </body>
</html>
