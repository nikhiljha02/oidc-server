<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OIDC Server</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #202124;
                color: #e8eaed;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            .card {
                width: 420px;
                background: #0f0f0f;
                border-radius: 16px;
                padding: 24px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            .header {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 14px;
                color: #e8eaed;
                margin-bottom: 16px;
            }

            .google-dot {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: conic-gradient(red, yellow, green, blue, red);
            }

            .divider {
                height: 1px;
                background: #3c4043;
                margin: 10px 0 20px;
            }

            .title {
                font-size: 26px;
                font-weight: 500;
                line-height: 1.3;
                margin-bottom: 16px;
            }

            .subtitle {
                font-size: 14px;
                color: #bdc1c6;
                margin-bottom: 12px;
            }

            .error {
                font-size: 13px;
                color: #9aa0a6;
            }

            .footer {
                margin-top: 25px;
                font-size: 12px;
                color: #9aa0a6;
                display: flex;
                justify-content: space-between;
            }

            a {
                color: #8ab4f8;
                text-decoration: none;
            }
        </style>
    </head>

    <body>
        <div class="card">
            <div class="header">
                <div class="google-dot"></div>
                <span>Sign in with OIDC</span>
            </div>

            <div class="divider"></div>

            <div class="title">
                <p class="access">Access blocked:</p>
                <br />
                Authorization Error
            </div>

            <div class="subtitle">
                Required parameter is missing: response_type
                <br />
                <a href="#">Learn more about this error</a>
            </div>

            <div class="error">
                If you are a developer of this app, see error details.
                <br /><br />
                Error 400: invalid_request
            </div>

            <div class="footer">
                <span>English (United States)</span>
                <span>
                    <a href="#">Help</a> · <a href="#">Privacy</a> ·
                    <a href="#">Terms</a>
                </span>
            </div>
        </div>
    </body>
</html>
